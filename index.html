<!doctype html>
<html>
  <head>
    <style>
      
    </style>
  </head>
  <body>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <p>{{ message }}</p>
    {% endfor %}
    {% endif %}
    {% endwith %}
    <form action="/upload" enctype="multipart/form-data" method='POST'>
    <input type="file" accept=".md,text/markdown" name='file' >
    <button type="submit">Submit</button>
    </form>
  </body>
</html>
